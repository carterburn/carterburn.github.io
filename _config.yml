title: carterburn
url: "https://blog.burnthe.dev"
baseurl: ""


minimal_mistakes_skin: dark
search: true

# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes
# Outputting
permalink: /:categories/:title/
paginate: 5 # amount of posts to show
paginate_path: /page:num/
timezone: Etc/UTC

include:
  - _pages

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

author:
  name   : "Carter Burn"
  avatar : "/assets/images/icon.jpg"
  bio    : "Writings and brain dumps"
  links:
    - label: "Website"
      icon: "fas fa-fw fa-link"
      url: "https://blog.burnthe.dev"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/carterburn"

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/carterburn"

defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

analytics:
  provider: "google-gtag"
  google:
    tracking_id: "G-JNPW5TF6YZ"
    anonymize_ip: false
